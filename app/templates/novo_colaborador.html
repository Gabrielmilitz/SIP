{% extends 'base.html' %}

{% block content %}
<style>
    h2 {
        color: #2c3e50;
        margin-top: 30px;
        text-align: center;
    }

    form {
        background-color: #f9f9f9;
        padding: 20px;
        border-radius: 8px;
        max-width: 500px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        margin: 20px auto; /* centraliza o formulário */
    }

    label {
        font-weight: bold;
        display: block;
        margin-top: 10px;
        margin-bottom: 5px;
        color: #333;
    }

    input[type="text"], input[type="email"] {
        width: 100%;
        padding: 10px;
        border-radius: 4px;
        border: 1px solid #ccc;
        margin-bottom: 15px;
    }

    input[type="submit"], button {
        background-color: rgb(68, 80, 69);
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 4px;
        cursor: pointer;
    }

    input[type="submit"]:hover, button:hover {
        background-color: #27ae60;
    }
</style>

<h2>Adicionar Novo Colaborador</h2>

<form method="POST">
    {{ form.hidden_tag() }}
    
    <label for="nome">{{ form.nome.label }}</label>
    {{ form.nome(size=40) }}

    <label for="email">{{ form.email.label }}</label>
    {{ form.email(size=40) }}

    {{ form.submit() }}
</form>
{% endblock %}
