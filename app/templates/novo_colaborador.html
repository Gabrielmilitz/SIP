{% extends 'base.html' %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/novo_colaborador_estilo.css') }}">

<h2>Adicionar Novo Colaborador</h2>

<form method="POST">
    {{ form.hidden_tag() }}
    
    <label for="nome">{{ form.nome.label }}</label>
    {{ form.nome(size=40) }}

    <label for="email">{{ form.email.label }}</label>
    {{ form.email(size=40) }}

    {{ form.submit() }}
</form>
{% endblock %}
