<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP - Sistema Integrado de Inspeção</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #1d3557, #457b9d);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #ffffff;
            padding: 50px 60px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 90%;
        }

        img.logo {
            width: 120px;
            margin-bottom: 20px;
        }

        h1 {
            margin-bottom: 30px;
            color: #2c3e50;
            font-size: 28px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
            background-color:rgb(51, 60, 66);
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .btn:hover,
        .btn:focus {
            background-color:rgb(48, 59, 67);
            outline: none;
        }
    </style>
</head>
<body>
    <main class="container">
        <!-- ✅ Logo da Meta -->
        <img src="{{ url_for('static', filename='img/logo_empresa.png') }}" alt="Logo Meta" class="logo">
        
        <h1>SIP - Sistema Integrado de Inspeção</h1>
        <a href="{{ url_for('login') }}" class="btn">Entrar</a>
    </main>
</body>
</html>
